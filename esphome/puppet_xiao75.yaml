esphome:
  name: xiao75eink_puppet
  friendly_name: XIAO 7.5" E-Ink (Puppet)

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Keep logs lightweight to preserve heap on ESP32-C3.
logger:
  level: WARN

api:
  encryption:
    key: "REPLACE_WITH_YOUR_API_KEY"

ota:
  - platform: esphome
    password: "REPLACE_WITH_YOUR_OTA_PASSWORD"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "xiao75eink-puppet-fallback"
    password: "changeme123"
  on_connect:
    then:
      # Avoid fetching before network stack is fully ready after association.
      - delay: 2s
      - component.update: puppet_image

captive_portal:

http_request:
  verify_ssl: false
  timeout: 20s
  watchdog_timeout: 30s
  useragent: esphome-xiao75-puppet

spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

# Memory tuning for ESP32-C3:
# - keep buffer_size small so online_image does not request a large contiguous block
# - avoid extra components (web_server, many fonts, etc.)
online_image:
  - id: puppet_image
    format: BMP
    type: BINARY
    buffer_size: 4096
    url: "http://192.168.8.240:10000/lovelace/test?viewport=800x480&colors=000000,ffffff&dithering=floyd-steinberg&format=bmp&theme=Graphite+E-ink+Light&zoom=1&wait=400&lang=en&next=30&bmp_mode=binary"
    update_interval: 10min
    on_download_finished:
      - component.update: main_display
      - lambda: 'id(last_download_ok) = true;'
    on_error:
      - logger.log:
          level: WARN
          format: "Puppet image download/decode failed"
      - lambda: 'id(last_download_ok) = false;'

display:
  - platform: waveshare_epaper
    id: main_display
    model: 7.50inv2
    cs_pin: GPIO3
    dc_pin: GPIO5
    busy_pin:
      number: GPIO4
      inverted: true
    reset_pin: GPIO2
    update_interval: never
    lambda: |-
      it.image(0, 0, id(puppet_image));

deep_sleep:
  id: battery_saver
  run_duration: 45s
  sleep_duration: 10min

globals:
  - id: last_download_ok
    type: bool
    restore_value: no
    initial_value: "false"

interval:
  # Retry while awake if Wi-Fi took time to associate at boot.
  - interval: 12s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: "return !id(last_download_ok);"
          then:
            - component.update: puppet_image
