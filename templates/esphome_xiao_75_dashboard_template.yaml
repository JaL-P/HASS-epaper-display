esphome:
  name: xiao-75-epaper
  friendly_name: XIAO 7.5 EPaper

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "hQbCFGe17uH2bC8g9QrklLhip5qhADH/+yJ7+lTgeUM="

ota:
  - platform: esphome
    password: "09fd079beadb6deadc8338100e90ebdd"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Epaper-Setup"
    password: "connectme!1"

captive_portal:

time:
  - platform: homeassistant
    id: ha_time

font:
  - file: "gfonts://Inter@400"
    id: font_small
    size: 22

  - file: "gfonts://Inter@600"
    id: font_medium
    size: 34

  - file: "gfonts://Inter@700"
    id: font_clock
    size: 96

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: mdi_30
    size: 30
    glyphs:
      - "\U000F0335" # lightbulb
      - "\U000F1928" # bike-electric
      - "\U000F140B" # lightning-bolt
      - "\U000F0E4F" # lightning-bolt-circle
      - "\U000F10C3" # cash-fast
      - "\U000F1408" # transmission-tower
      - "\U000F058E" # water-percent
      - "\U000F07E4" # molecule-co2

spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

display:
  - platform: waveshare_epaper
    id: epd
    model: 7.50inv2
    cs_pin: GPIO3
    dc_pin: GPIO5
    busy_pin:
      number: GPIO4
      inverted: true
    reset_pin: GPIO2
    rotation: 0
    update_interval: 300s
    lambda: |-
      // 800 x 480
      auto now = id(ha_time).now();
      if (now.is_valid()) {
        it.strftime(28, 24, id(font_medium), "%a %d %b %Y", now);
        it.strftime(772, 18, id(font_clock), TextAlign::TOP_RIGHT, "%H:%M", now);
      }

      // 4 columns x 2 rows cards
      const int start_x = 20;
      const int start_y = 120;
      const int w = 185;
      const int h = 160;
      const int g = 10;

      auto card = [&](int col, int row, const char *title, const char *icon, const std::string &value, bool big) {
        int x = start_x + col * (w + g);
        int y = start_y + row * (h + g);
        it.rectangle(x, y, w, h);
        it.printf(x + 12, y + 14, id(font_medium), "%s", title);
        it.printf(x + w - 14, y + 10, id(mdi_30), TextAlign::TOP_RIGHT, "%s", icon);
        if (big) {
          it.printf(x + w - 12, y + h - 14, id(font_medium), TextAlign::BOTTOM_RIGHT, "%s", value.c_str());
        } else {
          it.printf(x + w - 12, y + h - 14, id(font_small), TextAlign::BOTTOM_RIGHT, "%s", value.c_str());
        }
      };

      card(0, 0, "Living Room\nLights", "\U000F0335", id(card_lights).state, true);
      card(1, 0, "E-Bike\nCharger", "\U000F1928", id(card_ebike_plug).state, true);
      card(2, 0, "E-Bike\nCharging", "\U000F140B", id(card_ebike_status).state, true);
      card(3, 0, "E-Bike\nPower", "\U000F0E4F", id(card_ebike_power).state, true);

      card(0, 1, "Elec Rate\nNow", "\U000F10C3", id(card_elec_rate).state, true);
      card(1, 1, "E-Bike Cost\nSession", "\U000F10C3", id(card_ebike_cost).state, true);
      card(2, 1, "Wall Fairy\nPower", "\U000F1408", id(card_wall_fairy_power).state, true);
      card(3, 1, "Wall Fairy\nVoltage", "\U000F1408", id(card_wall_fairy_voltage).state, true);

text_sensor:
  - platform: homeassistant
    id: card_lights
    entity_id: sensor.epaper_card_lights
    internal: true

  - platform: homeassistant
    id: card_ebike_plug
    entity_id: sensor.epaper_card_ebike_plug
    internal: true

  - platform: homeassistant
    id: card_ebike_status
    entity_id: sensor.epaper_card_ebike_status
    internal: true

  - platform: homeassistant
    id: card_ebike_power
    entity_id: sensor.epaper_card_ebike_power
    internal: true

  - platform: homeassistant
    id: card_elec_rate
    entity_id: sensor.epaper_card_elec_rate
    internal: true

  - platform: homeassistant
    id: card_ebike_cost
    entity_id: sensor.epaper_card_ebike_cost
    internal: true

  - platform: homeassistant
    id: card_wall_fairy_power
    entity_id: sensor.epaper_card_wall_fairy_power
    internal: true

  - platform: homeassistant
    id: card_wall_fairy_voltage
    entity_id: sensor.epaper_card_wall_fairy_voltage
    internal: true
